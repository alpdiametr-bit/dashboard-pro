# dashboard-pro — Nginx reverse proxy
# dashboard-pro.uz (port 80) → Next.js app (app:3000)

upstream dashboard_app {
    server app:3000;
}

server {
    listen 80;
    listen [::]:80;
    server_name dashboard-pro.uz www.dashboard-pro.uz localhost;

    # Excel hisobot fayllari uchun yetarli hajm
    client_max_body_size 50m;

    # Proksilash sozlamalari
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 300s;

    location / {
        proxy_pass http://dashboard_app;
    }
}
